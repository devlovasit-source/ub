user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # basic hardening
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 12s;

    # gateway-level upload protection
    client_max_body_size 5m;

    # per-IP request limiting at the edge
    limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=perip_conn:20m;

    # structured access logs
    log_format json_combined escape=json
      '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request","status":$status,'
      '"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,"upstream_time":"$upstream_response_time",'
      '"http_referer":"$http_referer","http_user_agent":"$http_user_agent"}';
    access_log /var/log/nginx/access.log json_combined;

    include /etc/nginx/conf.d/*.conf;
}
