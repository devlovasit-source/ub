name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi pydantic pydantic-settings pillow requests python-dotenv redis appwrite

      - name: Run tests
        env:
          STRICT_ENV_VALIDATION: "false"
          ENVIRONMENT: "test"
          APP_ENV: "test"
        run: |
          pytest -q tests
